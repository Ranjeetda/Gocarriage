name: gocarriage_universal
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  get: ^4.3.8
  page_transition: ^2.0.4
  provider: ^6.0.0
  http: ^1.4.0
  flutter_styled_toast: ^2.2.1
  flutter_spinkit: ^5.1.0
  shared_preferences:
  fluttertoast: ^8.0.9
  image_picker: ^1.0.4
  camera: ^0.10.5+9
  camera_avfoundation:
  intl: ^0.19.0
  google_fonts: ^6.1.0
  webview_flutter: ^4.7.0
  #==============================
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  google_maps_flutter: ^2.1.1
  location: ^5.0.3
  place_picker_google: ^0.0.15
  google_places_flutter: ^2.0.0
  flutter_polyline_points: ^2.1.0
  socket_io_client: ^2.0.3
  flutter_html: ^3.0.0
  curved_navigation_bar: ^1.0.3
  font_awesome_flutter: ^10.4.0
  url_launcher: ^6.3.2
  firebase_auth: ^5.4.1
  firebase_core: ^3.10.1
  firebase_messaging: ^15.2.1
  flutter_foreground_task: ^6.1.2
  flutter_local_notifications: any
  device_info_plus: ^9.0.3
  event_bus: ^2.0.1
  pin_code_fields: ^8.0.1
  auto_size_text: ^3.0.0
  file_picker: ^10.3.10
  audioplayers: ^5.2.1





dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1   # ✅ added here

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

# ✅ Launcher icon config
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"   # <-- put your icon here
  min_sdk_android: 21